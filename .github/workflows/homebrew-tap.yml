name: Update Homebrew Tap

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  update-tap:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get release tag
        id: release
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(curl -s https://api.github.com/repos/Gisto/Gisto/releases/latest | jq -r '.tag_name')" >> $GITHUB_OUTPUT
          fi

      - name: Download x64 DMG and calculate SHA256
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          TAG_NO_V=$(echo "$TAG" | sed 's/^v//')
          curl -sL "https://github.com/Gisto/Gisto/releases/download/v${TAG_NO_V}/Gisto_${TAG_NO_V}_x64.dmg" -o Gisto_x64.dmg
          echo "sha_x64=$(shasum -a 256 Gisto_x64.dmg | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          test -s Gisto_x64.dmg || exit 1
        id: hash_x64

      - name: Download aarch64 DMG and calculate SHA256
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          TAG_NO_V=$(echo "$TAG" | sed 's/^v//')
          curl -sL "https://github.com/Gisto/Gisto/releases/download/v${TAG_NO_V}/Gisto_${TAG_NO_V}_aarch64.dmg" -o Gisto_aarch64.dmg
          echo "sha_aarch64=$(shasum -a 256 Gisto_aarch64.dmg | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          test -s Gisto_aarch64.dmg || exit 1
        id: hash_aarch64

      - name: Create homebrew-tap directory
        run: mkdir -p homebrew-tap/Casks

      - name: Create cask
        env:
          VERSION: ${{ steps.release.outputs.tag }}
          SHA_X64: ${{ steps.hash_x64.outputs.sha_x64 }}
          SHA_AARCH64: ${{ steps.hash_aarch64.outputs.sha_aarch64 }}
        run: |
          VERSION_NO_V=$(echo "$VERSION" | sed 's/^v//')
          cat > homebrew-tap/Casks/gisto.rb << 'RUBY'
          cask "gisto" do
            arch arm: "aarch64", intel: "x64"

            version "<VERSION>"
            sha256 arm:   "<SHA_AARCH64>",
                   intel: "<SHA_X64>"

            url do
              base_url = "https://github.com/Gisto/Gisto/releases/download/v<VERSION>/Gisto_<VERSION>_<arch>.dmg"
              base_url.gsub("<arch>", Hardware::CPU.arch == :arm ? "aarch64" : "x64")
            end
            name "Gisto"
            desc "Cross-platform snippets management desktop application"
            homepage "https://www.gisto.org/"

            app "Gisto.app"

            zap trash: [
              "~/Library/Application Support/Gisto",
              "~/Library/Caches/com.gistoapp.gisto2",
              "~/Library/Logs/Gisto",
              "~/Library/Preferences/com.gistoapp.gisto2.helper.plist",
              "~/Library/Preferences/com.gistoapp.gisto2.plist",
              "~/Library/Saved Application State/com.gistoapp.gisto2.savedState",
            ]
          end
          RUBY

          sed -i "s|<VERSION>|${VERSION_NO_V}|g" homebrew-tap/Casks/gisto.rb
          sed -i "s|<SHA_X64>|${SHA_X64}|g" homebrew-tap/Casks/gisto.rb
          sed -i "s|<SHA_AARCH64>|${SHA_AARCH64}|g" homebrew-tap/Casks/gisto.rb

      - name: Get current cask SHA
        id: sha
        run: |
          echo "sha=$(gh api repos/Gisto/homebrew-tap/contents/Casks/gisto.rb --jq '.sha')" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update cask in tap repository
        run: |
          content=$(base64 homebrew-tap/Casks/gisto.rb)
          gh api repos/Gisto/homebrew-tap/contents/Casks/gisto.rb \
            -X PUT \
            -f content="$content" \
            -f branch=main \
            -f message='Update Gisto to ${{ steps.release.outputs.tag }}' \
            -f sha='${{ steps.sha.outputs.sha }}'
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Show generated cask
        run: cat homebrew-tap/Casks/gisto.rb
